<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-topbar" aria-label="Site navigation">
      <a class="brand" href="{{ '/' | relative_url }}">
        <img src="{{ '/assets/app-icon.png' | relative_url }}" width="34" height="34" alt="">
        <span>stayawake</span>
      </a>
      <nav class="topnav">
        <a href="{{ '/SCREENSHOTS.html' | relative_url }}">Screenshots</a>
        <a href="{{ site.repository_url }}/releases/latest">Download</a>
        <a href="{{ site.repository_url }}">GitHub</a>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>
  </body>
</html>
